name: Syntax Check

on:
  push:
    branches: [main]
    paths: ['**.py']
  pull_request:
    branches: [main]
    paths: ['**.py']

jobs:
  compile-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile all Python files
        run: python -m compileall -q .
